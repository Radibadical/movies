<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jake's Top 200 Movies</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search {
      width: 280px;
      padding: 0.4375rem 0.75rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.8125rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: #58a6ff; }
    .search::placeholder { color: #484f58; }

    .count { font-size: 0.75rem; color: #484f58; }

    /* ── Table ── */
    .table-wrap {
      padding: 0 2rem 3rem;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-weight: 500;
      font-size: 0.7rem;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: sticky;
      top: 0;
      background: #0d1117;
    }

    /* Column widths */
    .th-rank       { width: 3.5rem; }
    .th-title      { min-width: 180px; }
    .th-year       { width: 4rem; }
    .th-director   { width: 150px; }
    .th-country    { width: 80px; }
    .th-genre      { width: 150px; }
    .th-imdb       { width: 72px; }
    .th-meta       { width: 60px; }
    .th-watched    { width: 90px; }

    tbody tr.main-row { border-top: 1px solid #161b22; }
    tbody tr.main-row:hover td,
    tbody tr.main-row:hover + tr.notes-row td { background: #161b22; }

    tbody tr.notes-row td { padding-top: 0; padding-bottom: 0.625rem; }

    /* Star-rated section divider */
    tr.star-divider td {
      padding: 0.75rem 0.75rem 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #484f58;
      border-top: 1px solid #21262d;
      border-bottom: none;
    }

    td {
      padding: 0.5625rem 0.75rem;
      vertical-align: top;
    }

    /* ── Cell types ── */
    .col-rank {
      font-weight: 700;
      color: #484f58;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-size: 0.75rem;
      padding-top: 0.625rem;
    }
    .col-rank.stars { color: #d4a017; font-size: 0.8125rem; }

    .col-title {
      font-weight: 500;
      color: #e6edf3;
    }

    .col-year {
      color: #8b949e;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .col-director { color: #c9d1d9; }

    .col-country {
      color: #8b949e;
      font-size: 0.75rem;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .col-genre {
      color: #8b949e;
      font-size: 0.75rem;
    }

    .col-imdb { color: #d4a017; white-space: nowrap; }

    .col-meta { color: #8b949e; }

    .col-watched {
      color: #484f58;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .col-notes {
      color: #8b949e;
      font-style: italic;
      line-height: 1.55;
      padding-left: 3.5rem; /* align under title */
    }

    /* ── States ── */
    .loading, .empty {
      padding: 4rem 2rem;
      text-align: center;
      color: #484f58;
      font-size: 0.875rem;
    }

    .spinner {
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid #21262d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header, .toolbar, .table-wrap { padding-left: 1rem; padding-right: 1rem; }
      .search { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>Jake's Top 200 Movies</h1>
</header>

<div class="toolbar">
  <input class="search" id="search" type="search" placeholder="Search…" autocomplete="off">
  <span class="count" id="count"></span>
</div>

<div id="content"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const SPREADSHEET_ID = '12ETUXbIPiwozu_M6Y1Z1hmpsevIbBSxyJQNGbKM-22M';

// Columns shown in the main row (Notes is rendered as a sub-row separately)
const TABLE_COLS = [
  'Rank', 'Title', 'Year', 'Director', 'Country',
  'Genre', 'IMDB Rating', 'Metascore', 'Last Watched',
];

// ── State ────────────────────────────────────────────────────────────────────
let cache = null;
let query = '';

// ── CSV parser ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false, i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i += 2; continue; }
      if (ch === '"') { inQuotes = false; i++; continue; }
      field += ch;
    } else {
      if (ch === '"') { inQuotes = true; i++; continue; }
      if (ch === ',') { row.push(field); field = ''; i++; continue; }
      if (ch === '\r' && text[i + 1] === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; i += 2; continue;
      }
      if (ch === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; i++; continue;
      }
      field += ch;
    }
    i++;
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

async function fetchMovies() {
  if (cache) return cache;
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&sheet=Movies`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} — check the sheet is publicly shared`);
  const parsed = parseCSV(await res.text());
  if (!parsed.length) throw new Error('Empty response');
  const cols = parsed[0].map(c => c.trim());
  const rows = parsed.slice(1).map(r => r.map(c => c.trim()));
  cache = { cols, rows };
  return cache;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function isStarRank(val) {
  return val.includes('★') || val.includes('✮');
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTable({ cols, rows }) {
  const idx = {};
  cols.forEach((c, i) => { if (c) idx[c] = i; });

  const displayCols = TABLE_COLS.filter(c => c in idx);
  const notesIdx = idx['Notes'];
  const colCount = displayCols.length;

  const q = query.toLowerCase();
  const filtered = rows.filter(row => {
    const title = row[idx['Title']] || '';
    if (!title.trim()) return false;
    if (!q) return true;
    const note = notesIdx !== undefined ? (row[notesIdx] || '') : '';
    return displayCols.some(c => (row[idx[c]] || '').toLowerCase().includes(q))
      || note.toLowerCase().includes(q);
  });

  document.getElementById('count').textContent =
    filtered.length ? `${filtered.length} title${filtered.length !== 1 ? 's' : ''}` : '';

  if (!filtered.length) {
    document.getElementById('content').innerHTML =
      `<div class="empty">No results${q ? ` for "${esc(q)}"` : ''}.</div>`;
    return;
  }

  const thClass = {
    'Rank': 'th-rank', 'Title': 'th-title', 'Year': 'th-year',
    'Director': 'th-director', 'Country': 'th-country', 'Genre': 'th-genre',
    'IMDB Rating': 'th-imdb', 'Metascore': 'th-meta', 'Last Watched': 'th-watched',
  };
  const head = displayCols
    .map(c => `<th class="${thClass[c] || ''}">${esc(c)}</th>`).join('');

  let inStarSection = false;
  let body = '';

  for (const row of filtered) {
    const rank = row[idx['Rank']] || '';
    const note = notesIdx !== undefined ? (row[notesIdx] || '') : '';

    // Insert divider when transitioning from numbered to star-rated
    if (!inStarSection && isStarRank(rank)) {
      inStarSection = true;
      body += `<tr class="star-divider"><td colspan="${colCount}">Star ratings</td></tr>`;
    }

    const tds = displayCols.map(c => {
      const val = row[idx[c]] || '';
      switch (c) {
        case 'Rank':
          return isStarRank(val)
            ? `<td class="col-rank stars">${esc(val)}</td>`
            : `<td class="col-rank">${esc(val)}</td>`;
        case 'Title':    return `<td class="col-title">${esc(val)}</td>`;
        case 'Year':     return `<td class="col-year">${esc(val)}</td>`;
        case 'Director': return `<td class="col-director">${esc(val)}</td>`;
        case 'Country':  return val ? `<td class="col-country" title="${esc(val)}">${esc(val)}</td>` : '<td></td>';
        case 'Genre':    return `<td class="col-genre">${esc(val)}</td>`;
        case 'IMDB Rating': return val ? `<td class="col-imdb">★ ${esc(val)}</td>` : '<td></td>';
        case 'Metascore':   return `<td class="col-meta">${esc(val)}</td>`;
        case 'Last Watched': return val ? `<td class="col-watched">${esc(val)}</td>` : '<td></td>';
        default: return `<td>${esc(val)}</td>`;
      }
    }).join('');

    body += `<tr class="main-row">${tds}</tr>`;

    if (note) {
      body += `<tr class="notes-row">` +
        `<td></td>` +
        `<td colspan="${colCount - 1}" class="col-notes">${esc(note)}</td>` +
        `</tr>`;
    }
  }

  document.getElementById('content').innerHTML =
    `<div class="table-wrap"><table>` +
    `<thead><tr>${head}</tr></thead>` +
    `<tbody>${body}</tbody>` +
    `</table></div>`;
}

async function load() {
  document.getElementById('content').innerHTML =
    `<div class="loading"><div class="spinner"></div>Loading…</div>`;
  try {
    renderTable(await fetchMovies());
  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="empty">${esc(err.message)}</div>`;
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  if (cache) renderTable(cache);
});

load();
</script>
</body>
</html>
