<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radibadical Top 200 Movies</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .back {
      color: #8b949e;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .back:hover { color: #e6edf3; }
    .site-title {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex: 1;
    }
    .title-rule {
      flex: 1;
      height: 1px;
      background: #2d5a8e;
    }
    .title-text { text-align: center; flex-shrink: 0; }
    .title-byline {
      font-size: 0.7rem;
      font-weight: 600;
      color: #a07820;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .title-main {
      font-size: 1.5rem;
      font-weight: 700;
      color: #8b949e;
      letter-spacing: 1px;
    }

    /* ── Page nav ── */
    .page-nav {
      display: flex;
      padding: 0 2rem;
      border-bottom: 1px solid #21262d;
      gap: 0.25rem;
    }

    .page-tab {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      color: #8b949e;
      font-size: 0.8125rem;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .page-tab:hover { color: #e6edf3; }
    .page-tab.active { color: #e6edf3; border-bottom-color: #58a6ff; font-weight: 500; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search {
      width: 280px;
      padding: 0.4375rem 0.75rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.8125rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: #58a6ff; }
    .search::placeholder { color: #484f58; }

    .count { font-size: 0.75rem; color: #484f58; white-space: nowrap; }

    /* ── States ── */
    .loading, .empty {
      padding: 4rem 2rem;
      text-align: center;
      color: #484f58;
      font-size: 0.875rem;
    }

    .spinner {
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid #21262d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════════
       DESKTOP TABLE (≥ 700px)
    ═══════════════════════════════════════════════ */
    .table-wrap {
      padding: 0 2rem 3rem;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead th {
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-weight: 500;
      font-size: 0.7rem;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: sticky;
      top: 0;
      background: #0d1117;
    }

    .th-rank     { width: 3.5rem; }
    .th-title    { min-width: 180px; }
    .th-year     { width: 4rem; }
    .th-director { width: 150px; }
    .th-country  { width: 160px; }
    .th-genre    { width: 150px; }
    .th-imdb     { width: 72px; }
    .th-meta     { width: 60px; }
    .th-watched  { width: 90px; }

    tbody tr.main-row { border-top: 1px solid #161b22; }
    tbody tr.main-row:hover td,
    tbody tr.main-row:hover + tr.notes-row td { background: #161b22; }
    tbody tr.notes-row td { padding-top: 0; padding-bottom: 0.625rem; }

    td { padding: 0.5625rem 0.75rem; vertical-align: top; }

    .col-rank {
      font-weight: 700;
      color: #a07820;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-size: 1.125rem;
      padding-top: 0.625rem;
    }
    .col-rank.stars { color: #d4a017; font-size: 1.125rem; }
    .half-star {
      display: inline-block;
      position: relative;
      color: #484f58;
    }
    .half-star::before {
      content: '★';
      position: absolute;
      left: 0;
      top: 0;
      width: 50%;
      overflow: hidden;
      color: #d4a017;
    }
    .col-title    { font-weight: 500; color: #e6edf3; font-size: 1.125rem; }
    .col-tags     { margin-top: 0.25rem; display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .tag-badge {
      display: inline-block; font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.05em; padding: 0.1rem 0.4rem;
      border-radius: 999px; text-transform: uppercase;
    }
    /* Vibe/Style share one color per type; Category tags get an inline
       color-mix() background computed from their tags.json hex at render
       time (see renderTags/fetchTags), so no per-tag class is needed here. */
    .tag-vibe             { background: #0d2137; color: #60a5fa; }
    .tag-style            { background: #3d1a2a; color: #f472b6; }
    .tag-default          { background: #21262d; color: #8b949e; }
    .card-tags      { margin-top: 0.3rem; display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .col-year     { color: #8b949e; font-size: 0.75rem; white-space: nowrap; }
    .col-director { color: #c9d1d9; }
    .col-country  {
      color: #8b949e; font-size: 0.75rem;
      max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .col-genre   { color: #8b949e; font-size: 0.75rem; }
    .col-imdb    { color: #d4a017; white-space: nowrap; }
    .col-meta    { color: #8b949e; }
    .col-watched { color: #484f58; font-size: 0.75rem; white-space: nowrap; }
    .col-notes   {
      color: #8b949e; font-style: italic; line-height: 1.55;
      padding-left: 3.5rem;
    }

    /* ═══════════════════════════════════════════════
       MOBILE CARDS (< 700px)
    ═══════════════════════════════════════════════ */
    .cards {
      padding: 0.5rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 0.875rem 1rem;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .card-rank {
      font-weight: 700;
      color: #a07820;
      font-size: 1.25rem;
      font-variant-numeric: tabular-nums;
      min-width: 2.5rem;
      padding-top: 0.15rem;
      flex-shrink: 0;
    }
    .card-rank.stars { color: #d4a017; font-size: 1.25rem; line-height: 1.4; }
    .card-rank .half-star { font-size: inherit; }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-weight: 600;
      color: #e6edf3;
      font-size: 1.25rem;
      line-height: 1.3;
    }

    .card-secondary {
      margin-top: 0.3rem;
      font-size: 0.75rem;
      color: #8b949e;
      line-height: 1.4;
    }

    .card-genre {
      margin-top: 0.2rem;
      font-size: 0.7rem;
      color: #484f58;
    }

    .card-imdb {
      color: #d4a017;
      font-size: 0.8125rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 0.15rem;
    }

    .card-review {
      margin-top: 0.75rem;
      padding-top: 0.625rem;
      border-top: 1px solid #21262d;
      font-size: 0.8rem;
      color: #8b949e;
      font-style: italic;
      line-height: 1.6;
    }

    /* ── Responsive breakpoint ── */
    @media (min-width: 700px) {
      .cards { display: none; }
    }

    @media (max-width: 699px) {
      .table-wrap { display: none; }
      header, .toolbar, .page-nav, .bottom-nav { padding-left: 1rem; padding-right: 1rem; }
      .search { width: 100%; }
    }

    /* ── History badges ── */
    .h-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      white-space: nowrap;
    }
    .h-badge-watched { background: #1a3a2a; color: #3fb950; }
    .h-badge-ranked  { background: #1a2a3a; color: #58a6ff; }
    .h-arrow-up   { color: #3fb950; font-weight: 700; cursor: pointer; }
    .h-arrow-down { color: #f85149; font-weight: 700; cursor: pointer; }
    .col-rank .h-arrow-up, .col-rank .h-arrow-down,
    .card-rank .h-arrow-up, .card-rank .h-arrow-down { font-size: 0.6rem; }

    /* ── Rewatch rank ── */
    .rewatch-old { color: #484f58; font-size: 0.85em; }

    /* ── Bottom nav ── */
    .bottom-nav {
      display: flex;
      padding: 0 2rem 1.5rem;
      border-top: 1px solid #21262d;
      gap: 0.25rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<header>
  <a class="back" href="/">&#8592; radibadical</a>
  <div class="site-title">
    <span class="title-rule"></span>
    <div class="title-text">
      <div class="title-byline">Radibadical</div>
      <div class="title-main">Top 200 Movies</div>
    </div>
    <span class="title-rule"></span>
  </div>
</header>

<nav class="page-nav">
  <button class="page-tab" data-page="top100">1–100</button>
  <button class="page-tab" data-page="top200">101–200</button>
  <button class="page-tab" data-page="starred">★ Rated</button>
  <button class="page-tab" data-page="history">Recently Watched</button>
</nav>

<div class="toolbar">
  <input class="search" id="search" type="search" placeholder="Search…" autocomplete="off">
  <span class="count" id="count"></span>
</div>

<div id="content"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const SPREADSHEET_ID = '12ETUXbIPiwozu_M6Y1Z1hmpsevIbBSxyJQNGbKM-22M';

const TABLE_COLS = [
  'Rank', 'Title', 'Year', 'Director', 'Country',
  'Genre', 'IMDB Rating', 'Metascore', 'Last Watched',
];

const PAGES = {
  top100:  r => { const n = parseInt(r, 10); return Number.isInteger(n) && n >= 1   && n <= 100; },
  top200:  r => { const n = parseInt(r, 10); return Number.isInteger(n) && n >= 101 && n <= 200; },
  starred: r => r.includes('★') || r.includes('✮'),
  history: () => false, // rendered separately
};

// ── State ────────────────────────────────────────────────────────────────────
let cache        = null;
let historyCache = null;
let rankChanges  = {};
let query        = '';
let activePage = 'top100';

// Tag type/color lookup, keyed by lowercase tag name. Populated at load time
// from tags.json (the same vocabulary file the bot writes via /newtag) so
// this page never needs a manual edit when a tag is added or reclassified.
let tagsData  = null;
let TAG_LOOKUP = {};
const HEX_RE = /^#[0-9a-fA-F]{6}$/;

async function fetchTags() {
  if (tagsData) return tagsData;
  try {
    const res = await fetch('tags.json', { cache: 'no-store' });
    tagsData = res.ok ? await res.json() : {};
  } catch {
    tagsData = {};
  }
  TAG_LOOKUP = {};
  (tagsData.vibe || []).forEach(t => { TAG_LOOKUP[t.toLowerCase()] = { type: 'vibe' }; });
  (tagsData.style || []).forEach(t => { TAG_LOOKUP[t.toLowerCase()] = { type: 'style' }; });
  Object.entries(tagsData.category || {}).forEach(([t, color]) => {
    TAG_LOOKUP[t.toLowerCase()] = { type: 'category', color };
  });
  return tagsData;
}

function renderTags(tagsStr) {
  if (!tagsStr) return '';
  const badges = tagsStr.split(',').map(t => {
    const label = t.trim();
    if (!label) return '';
    const info = TAG_LOOKUP[label.toLowerCase()];
    if (info && info.type === 'category' && HEX_RE.test(info.color || '')) {
      const style = `color:${info.color};background:color-mix(in srgb, ${info.color} 18%, #0d1117);`;
      return `<span class="tag-badge" style="${style}">${esc(label)}</span>`;
    }
    const cls = info && (info.type === 'vibe' || info.type === 'style') ? `tag-${info.type}` : 'tag-default';
    return `<span class="tag-badge ${cls}">${esc(label)}</span>`;
  }).join('');
  return badges ? `<div class="col-tags">${badges}</div>` : '';
}

function clearTrend(titleKey, newN, el) {
  const trends = JSON.parse(localStorage.getItem('movieTrends') || '{}');
  trends[titleKey] = newN;
  localStorage.setItem('movieTrends', JSON.stringify(trends));
  el.remove();
}

// ── CSV parser ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false, i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i += 2; continue; }
      if (ch === '"') { inQuotes = false; i++; continue; }
      field += ch;
    } else {
      if (ch === '"') { inQuotes = true; i++; continue; }
      if (ch === ',') { row.push(field); field = ''; i++; continue; }
      if (ch === '\r' && text[i + 1] === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; i += 2; continue;
      }
      if (ch === '\n') {
        row.push(field); rows.push(row); row = []; field = ''; i++; continue;
      }
      field += ch;
    }
    i++;
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

async function fetchMovies() {
  if (cache) return cache;
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&sheet=Movies`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} — check the sheet is publicly shared`);
  const parsed = parseCSV(await res.text());
  if (!parsed.length) throw new Error('Empty response');
  const cols = parsed[0].map(c => c.trim());
  const rows = parsed.slice(1).map(r => r.map(c => c.trim()));
  cache = { cols, rows };
  return cache;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function isStarRank(val) {
  return val.includes('★') || val.includes('✮');
}

function renderStars(val) {
  return val.split(' ').map(ch => {
    if (ch === '★') return '★';
    if (ch === '✮') return '<span class="half-star">★</span>';
    return '';
  }).join(' ');
}

function starLabel(val) {
  const full = (val.match(/★/g) || []).length;
  const half = val.includes('✮');
  return half ? `${full}½ Stars` : `${full} Stars`;
}

function getFiltered(rows, idx, displayCols, notesIdx) {
  const pageFilter = PAGES[activePage];
  const q = query.toLowerCase();
  const tagsIdx = idx['Tags'];
  return rows.filter(row => {
    const title = row[idx['Title']] || '';
    if (!title.trim()) return false;
    const rank = row[idx['Rank']] || '';
    // When searching, show results from all pages
    if (!q && !pageFilter(rank)) return false;
    if (!q) return true;
    const note = notesIdx !== undefined ? (row[notesIdx] || '') : '';
    const tags = tagsIdx !== undefined ? (row[tagsIdx] || '') : '';
    return displayCols.some(c => (row[idx[c]] || '').toLowerCase().includes(q))
      || note.toLowerCase().includes(q)
      || tags.toLowerCase().includes(q);
  });
}

// ── Desktop table ─────────────────────────────────────────────────────────────
function buildTable({ cols, rows }) {
  const idx = {};
  cols.forEach((c, i) => { if (c) idx[c] = i; });

  const displayCols = TABLE_COLS.filter(c => c in idx);
  const notesIdx    = idx['Notes'];
  const colCount    = displayCols.length;
  const filtered    = getFiltered(rows, idx, displayCols, notesIdx);

  document.getElementById('count').textContent =
    filtered.length ? `${filtered.length} title${filtered.length !== 1 ? 's' : ''}` : '';

  if (!filtered.length) {
    return `<div class="empty">No results${query ? ` for "${esc(query)}"` : ''}.</div>`;
  }

  const thClass = {
    'Rank': 'th-rank', 'Title': 'th-title', 'Year': 'th-year',
    'Director': 'th-director', 'Country': 'th-country', 'Genre': 'th-genre',
    'IMDB Rating': 'th-imdb', 'Metascore': 'th-meta', 'Last Watched': 'th-watched',
  };
  const head = displayCols.map(c => `<th class="${thClass[c] || ''}">${esc(c)}</th>`).join('');

  let body = '';
  for (const row of filtered) {
    const note = notesIdx !== undefined ? (row[notesIdx] || '') : '';
    const rowTitle = (row[idx['Title']] || '').toLowerCase();
    const tds = displayCols.map(c => {
      const val = row[idx[c]] || '';
      switch (c) {
        case 'Rank': {
          if (isStarRank(val)) {
            return `<td class="col-rank stars" title="${starLabel(val)}">${renderStars(val)}</td>`;
          }
          const n = parseInt(val, 10);
          let arrowHtml = '';
          if (Number.isFinite(n) && n >= 1 && n <= 200) {
            const rc = rankChanges[rowTitle];
            if (rc) {
              const delta = Math.abs(rc.newN - rc.oldN);
              const cls = rc.newN < rc.oldN ? 'h-arrow-up' : 'h-arrow-down';
              const sym = rc.newN < rc.oldN ? '↑' : '↓';
              arrowHtml = `<span class="${cls}" title="Click to clear trend" onclick="clearTrend('${rowTitle.replace(/'/g, "\\'")}',${rc.newN},this)">${sym}${delta}</span>`;
            }
          }
          return `<td class="col-rank">${esc(val)}${arrowHtml ? ' ' + arrowHtml : ''}</td>`;
        }
        case 'Title': {
          const tags = idx['Tags'] !== undefined ? (row[idx['Tags']] || '') : '';
          return `<td class="col-title">${esc(val)}${renderTags(tags)}</td>`;
        }
        case 'Year':         return `<td class="col-year">${esc(val)}</td>`;
        case 'Director':     return `<td class="col-director">${esc(val)}</td>`;
        case 'Country':      return val ? `<td class="col-country" title="${esc(val)}">${esc(val)}</td>` : '<td></td>';
        case 'Genre':        return `<td class="col-genre">${esc(val)}</td>`;
        case 'IMDB Rating':  return val ? `<td class="col-imdb">★ ${esc(val)}</td>` : '<td></td>';
        case 'Metascore':    return `<td class="col-meta">${esc(val)}</td>`;
        case 'Last Watched': return val ? `<td class="col-watched">${esc(val)}</td>` : '<td></td>';
        default:             return `<td>${esc(val)}</td>`;
      }
    }).join('');

    body += `<tr class="main-row">${tds}</tr>`;
    if (note) {
      body += `<tr class="notes-row"><td></td>` +
        `<td colspan="${colCount - 1}" class="col-notes">${esc(note)}</td></tr>`;
    }
  }

  return `<div class="table-wrap"><table>` +
    `<thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

// ── Mobile cards ──────────────────────────────────────────────────────────────
function buildCards({ cols, rows }) {
  const idx = {};
  cols.forEach((c, i) => { if (c) idx[c] = i; });

  const displayCols = TABLE_COLS.filter(c => c in idx);
  const notesIdx    = idx['Notes'];
  const filtered    = getFiltered(rows, idx, displayCols, notesIdx);

  if (!filtered.length) return '';

  let html = '<div class="cards">';
  for (const row of filtered) {
    const rank  = row[idx['Rank']]        || '';
    const title = row[idx['Title']]       || '';
    const year  = row[idx['Year']]        || '';
    const dir   = row[idx['Director']]    || '';
    const genre = row[idx['Genre']]       || '';
    const tags  = idx['Tags'] !== undefined ? (row[idx['Tags']] || '') : '';
    const imdb  = row[idx['IMDB Rating']] || '';
    const note  = notesIdx !== undefined ? (row[notesIdx] || '') : '';

    const rankClass = isStarRank(rank) ? 'card-rank stars' : 'card-rank';
    const rankTitle = isStarRank(rank) ? ` title="${starLabel(rank)}"` : '';
    const secondary = [year, dir].filter(Boolean).join(' · ');

    let cardArrow = '';
    if (!isStarRank(rank)) {
      const n = parseInt(rank, 10);
      if (Number.isFinite(n) && n >= 1 && n <= 200) {
        const rc = rankChanges[title.toLowerCase()];
        if (rc) {
          const delta = Math.abs(rc.newN - rc.oldN);
          const cls = rc.newN < rc.oldN ? 'h-arrow-up' : 'h-arrow-down';
          const sym = rc.newN < rc.oldN ? '↑' : '↓';
          const tk = title.toLowerCase().replace(/'/g, "\\'");
          cardArrow = `<span class="${cls}" title="Click to clear trend" onclick="clearTrend('${tk}',${rc.newN},this)">${sym}${delta}</span>`;
        }
      }
    }

    html += `<div class="card">
      <div class="card-header">
        <div class="${rankClass}"${rankTitle}>${isStarRank(rank) ? renderStars(rank) : esc(rank) + (cardArrow ? ' ' + cardArrow : '')}</div>
        <div class="card-body">
          <div class="card-title">${esc(title)}</div>
          ${secondary ? `<div class="card-secondary">${esc(secondary)}</div>` : ''}
          ${genre    ? `<div class="card-genre">${esc(genre)}</div>` : ''}
          ${renderTags(tags)}
        </div>
        ${imdb ? `<div class="card-imdb">★ ${esc(imdb)}</div>` : ''}
      </div>
      ${note ? `<div class="card-review">${esc(note)}</div>` : ''}
    </div>`;
  }
  html += '</div>';
  return html;
}

// ── Bottom nav ────────────────────────────────────────────────────────────────
function buildBottomNav() {
  const pages = [
    { id: 'top100',  label: '1–100' },
    { id: 'top200',  label: '101–200' },
    { id: 'starred', label: '★ Rated' },
    { id: 'history', label: 'Recently Watched' },
  ];
  const btns = pages.map(p =>
    `<button class="page-tab${p.id === activePage ? ' active' : ''}" onclick="setPage('${p.id}'); window.scrollTo(0,0)">${p.label}</button>`
  ).join('');
  return `<nav class="bottom-nav">${btns}</nav>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data) {
  document.getElementById('content').innerHTML = buildTable(data) + buildCards(data) + buildBottomNav();
}

// ── Page switching ────────────────────────────────────────────────────────────
function setPage(pageId) {
  activePage = pageId;
  history.replaceState(null, '', '#' + pageId);
  document.querySelectorAll('.page-tab').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.page === pageId)
  );
  const isHistory = pageId === 'history';
  document.querySelector('.toolbar').style.display = isHistory ? 'none' : '';
  if (isHistory) {
    renderHistoryPage();
  } else if (cache) {
    render(cache);
  }
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function load() {
  if (activePage !== 'history') {
    document.getElementById('content').innerHTML =
      `<div class="loading"><div class="spinner"></div>Loading…</div>`;
  }
  try {
    const [data] = await Promise.all([fetchMovies(), fetchTags()]);
    if (activePage !== 'history') render(data);
  } catch (err) {
    if (activePage !== 'history') {
      document.getElementById('content').innerHTML =
        `<div class="empty">${esc(err.message)}</div>`;
    }
  }
}

// ── History ───────────────────────────────────────────────────────────────────
const HISTORY_LIMIT = 30;

function historyVisible(row, ci) {
  return (row[ci['Type']] || '') === 'Watched';
}

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function fetchHistory() {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=1974417523`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const parsed = parseCSV(await res.text());
  if (parsed.length < 2) return { entries: [], total: 0, ci: {}, rankChanges: {} };
  const cols = parsed[0].map(c => c.trim());
  const ci = {};
  cols.forEach((c, i) => { if (c) ci[c] = i; });
  const allRows = parsed.slice(1).map(r => r.map(c => c.trim()));

  // Recently Watched tab: only Watched events
  const watchedRows = allRows.filter(r => (r[ci['Type']] || '') === 'Watched');
  const entries = watchedRows.slice(-HISTORY_LIMIT).reverse();

  // Main list arrows: most recent rank change per title, numeric 1-200 only, within 1 year.
  // Process history in row order so a Rank Changed that follows a Trend Reset shows an arrow.
  const cutoff = new Date();
  cutoff.setFullYear(cutoff.getFullYear() - 1);
  const trends = JSON.parse(localStorage.getItem('movieTrends') || '{}');
  const changes = {};

  // Rewatch rank tracking: detect Watched events that have a same-date Rank Changed entry.
  const rewatchChanges = {}; // "titleKey|date" → {oldRank, newRank}
  const pendingRankChange = {}; // titleKey → {oldRank, newRank, date}

  for (const row of allRows) {
    const type = row[ci['Type']] || '';
    const titleKey = (row[ci['Title']] || '').toLowerCase();
    const rowDateStr = row[ci['Date']] || '';
    const detail = row[ci['Detail']] || '';

    if (type === 'Trend Reset') {
      delete changes[titleKey];
      continue;
    }

    if (type === 'Rank Changed') {
      // Track for rewatch rank display (all rank changes, not just integer 1-200)
      const ai = detail.lastIndexOf('→');
      if (ai !== -1) {
        const newRank = detail.slice(ai + 1).replace(/\(.*\)/, '').trim();
        const beforeArrow = detail.slice(0, ai).trim();
        const colonIdx = beforeArrow.indexOf(':');
        const oldRank = colonIdx !== -1 ? beforeArrow.slice(colonIdx + 1).trim() : beforeArrow;
        pendingRankChange[titleKey] = { oldRank, newRank, date: rowDateStr };
      }

      // Main list trend arrows: integer ranks 1-200 only, within 1 year
      if (detail.includes('Watch List')) continue;
      const rowDate = new Date(rowDateStr);
      if (isNaN(rowDate) || rowDate < cutoff) continue;
      const arrowIdx = detail.lastIndexOf('→');
      if (arrowIdx === -1) continue;
      const newStr = detail.slice(arrowIdx + 1).trim();
      if (!/^\d+$/.test(newStr)) continue;
      const newN = parseInt(newStr, 10);
      if (newN < 1 || newN > 200) continue;
      const before = detail.slice(0, arrowIdx).trim();
      const oldStr = before.split(/[\s:]+/).pop();
      const oldN = parseInt(oldStr, 10);
      if (!Number.isFinite(oldN) || oldN === newN) continue;
      if (trends[titleKey] === newN) continue;
      changes[titleKey] = { oldN, newN, changeDate: rowDateStr };
      continue;
    }

    if (type === 'Watched' && detail.includes('rewatched')) {
      const rc = pendingRankChange[titleKey];
      if (rc && rc.date === rowDateStr) {
        rewatchChanges[titleKey + '|' + rowDateStr] = { oldRank: rc.oldRank, newRank: rc.newRank };
      }
    }
  }

  return { entries, total: watchedRows.length, ci, rankChanges: changes, rewatchChanges };
}

function buildHistoryContent({ entries, total, ci, rewatchChanges = {} }) {
  if (!entries.length) return '<div class="empty">No history yet.</div>' + buildBottomNav();

  // Build title → movie row lookup from the already-loaded Movies cache
  const movieLookup = {};
  const midx = {};
  if (cache) {
    cache.cols.forEach((c, i) => { if (c) midx[c] = i; });
    for (const mrow of cache.rows) {
      const t = (mrow[midx['Title']] || '').toLowerCase();
      if (t) movieLookup[t] = mrow;
    }
  }

  const getMov = (histRow, field) => {
    const m = movieLookup[(histRow[ci['Title']] || '').toLowerCase()];
    return m ? (m[midx[field]] || '') : '';
  };

  const countLine = total > HISTORY_LIMIT
    ? `<div class="count" style="padding:0.5rem 2rem">Last ${entries.length} of ${total} entries</div>` : '';

  const HIST_COLS = ['Date Watched', 'Rank', 'Title', 'Year', 'Director', 'Country', 'Genre', 'IMDB Rating', 'Metascore'];
  const thClass = {
    'Date Watched': 'th-watched', 'Rank': 'th-rank', 'Title': 'th-title', 'Year': 'th-year',
    'Director': 'th-director', 'Country': 'th-country', 'Genre': 'th-genre',
    'IMDB Rating': 'th-imdb', 'Metascore': 'th-meta',
  };
  const head = HIST_COLS.map(c => `<th class="${thClass[c] || ''}">${esc(c)}</th>`).join('');

  function renderRankCell(rank, rw, tdClass) {
    if (rw) {
      const oldHtml = isStarRank(rw.oldRank) ? renderStars(rw.oldRank) : esc(rw.oldRank);
      const newHtml = isStarRank(rw.newRank) ? renderStars(rw.newRank) : esc(rw.newRank);
      const cls = isStarRank(rw.newRank) ? `${tdClass} stars` : tdClass;
      return `<span class="rewatch-old">${oldHtml}</span> → ${newHtml}`;
    }
    if (isStarRank(rank)) return renderStars(rank);
    return esc(rank);
  }

  let body = '';
  for (const row of entries) {
    const histKey = (row[ci['Title']] || '').toLowerCase() + '|' + (row[ci['Date']] || '');
    const rw      = rewatchChanges[histKey] || null;
    const date    = fmtDate(row[ci['Date']] || '');
    const title   = getMov(row, 'Title') || esc(row[ci['Title']] || '');
    const rank    = getMov(row, 'Rank');
    const year    = getMov(row, 'Year');
    const dir     = getMov(row, 'Director');
    const cntry   = getMov(row, 'Country');
    const genre   = getMov(row, 'Genre');
    const imdb    = getMov(row, 'IMDB Rating');
    const meta    = getMov(row, 'Metascore');
    const note    = getMov(row, 'Notes');

    const tds = HIST_COLS.map(c => {
      switch (c) {
        case 'Date Watched': return `<td class="col-watched">${esc(date)}</td>`;
        case 'Rank': {
          const rankCls = (!rw && isStarRank(rank)) ? 'col-rank stars' : 'col-rank';
          const rankTitleAttr = (!rw && isStarRank(rank)) ? ` title="${starLabel(rank)}"` : '';
          return `<td class="${rankCls}"${rankTitleAttr}>${renderRankCell(rank, rw, 'col-rank')}</td>`;
        }
        case 'Title':        return `<td class="col-title">${esc(title)}</td>`;
        case 'Year':         return `<td class="col-year">${esc(year)}</td>`;
        case 'Director':     return `<td class="col-director">${esc(dir)}</td>`;
        case 'Country':      return cntry ? `<td class="col-country" title="${esc(cntry)}">${esc(cntry)}</td>` : '<td></td>';
        case 'Genre':        return `<td class="col-genre">${esc(genre)}</td>`;
        case 'IMDB Rating':  return imdb ? `<td class="col-imdb">★ ${esc(imdb)}</td>` : '<td></td>';
        case 'Metascore':    return `<td class="col-meta">${esc(meta)}</td>`;
        default:             return '<td></td>';
      }
    }).join('');

    body += `<tr class="main-row">${tds}</tr>`;
    if (note) {
      body += `<tr class="notes-row"><td></td><td></td>` +
        `<td colspan="${HIST_COLS.length - 2}" class="col-notes">${esc(note)}</td></tr>`;
    }
  }

  let out = countLine +
    `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;

  out += '<div class="cards">';
  for (const row of entries) {
    const histKey = (row[ci['Title']] || '').toLowerCase() + '|' + (row[ci['Date']] || '');
    const rw      = rewatchChanges[histKey] || null;
    const date    = fmtDate(row[ci['Date']] || '');
    const title   = getMov(row, 'Title') || (row[ci['Title']] || '');
    const rank    = getMov(row, 'Rank');
    const year    = getMov(row, 'Year');
    const dir     = getMov(row, 'Director');
    const genre   = getMov(row, 'Genre');
    const tags    = getMov(row, 'Tags');
    const imdb    = getMov(row, 'IMDB Rating');
    const note    = getMov(row, 'Notes');

    const secondary = [year, dir, date].filter(Boolean).join(' · ');
    let rankDiv;
    if (rw) {
      const oldHtml = isStarRank(rw.oldRank) ? renderStars(rw.oldRank) : esc(rw.oldRank);
      const newHtml = isStarRank(rw.newRank) ? renderStars(rw.newRank) : esc(rw.newRank);
      const cls = isStarRank(rw.newRank) ? 'card-rank stars' : 'card-rank';
      rankDiv = `<div class="${cls}"><span class="rewatch-old">${oldHtml}</span> → ${newHtml}</div>`;
    } else {
      const rankClass = isStarRank(rank) ? 'card-rank stars' : 'card-rank';
      const rankTitleAttr = isStarRank(rank) ? ` title="${starLabel(rank)}"` : '';
      rankDiv = `<div class="${rankClass}"${rankTitleAttr}>${isStarRank(rank) ? renderStars(rank) : esc(rank)}</div>`;
    }

    out += `<div class="card">
      <div class="card-header">
        ${rankDiv}
        <div class="card-body">
          <div class="card-title">${esc(title)}</div>
          ${secondary ? `<div class="card-secondary">${esc(secondary)}</div>` : ''}
          ${genre ? `<div class="card-genre">${esc(genre)}</div>` : ''}
          ${renderTags(tags)}
        </div>
        ${imdb ? `<div class="card-imdb">★ ${esc(imdb)}</div>` : ''}
      </div>
      ${note ? `<div class="card-review">${esc(note)}</div>` : ''}
    </div>`;
  }
  out += '</div>';

  out += buildBottomNav();
  return out;
}

function renderHistoryPage() {
  if (!historyCache) {
    document.getElementById('content').innerHTML =
      `<div class="loading"><div class="spinner"></div>Loading…</div>`;
    return;
  }
  document.getElementById('content').innerHTML = buildHistoryContent(historyCache);
}

async function loadHistory() {
  try {
    // Also wait on fetchMovies() here, not just fetchHistory()/fetchTags() —
    // buildHistoryContent() reads movie details (Year, Director, Notes, etc.)
    // from the module-level `cache` populated by fetchMovies(), which load()
    // fetches independently and concurrently. Without this, whichever fetch
    // wins the race decides whether Recently Watched renders with movie
    // details or blank ones — the History sheet is much smaller than Movies,
    // so it often resolved first, intermittently blanking Notes and every
    // other joined field. fetchMovies() memoizes via `cache`, so this is a
    // no-op once load() has already populated it.
    const [history] = await Promise.all([fetchHistory(), fetchTags(), fetchMovies()]);
    historyCache = history;
    rankChanges = historyCache.rankChanges;
    if (activePage === 'history') {
      renderHistoryPage();
    } else if (cache) {
      render(cache);
    }
  } catch (err) {
    if (activePage === 'history') {
      document.getElementById('content').innerHTML =
        `<div class="empty">${esc(err.message)}</div>`;
    }
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.page-tab').forEach(btn =>
  btn.addEventListener('click', () => setPage(btn.dataset.page))
);

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  if (cache) render(cache);
});

// Restore page from URL hash if present
const initialPage = location.hash.slice(1);
setPage(PAGES[initialPage] ? initialPage : 'top100');

load();
loadHistory();
</script>
